# applaunch-api/railway.toml
# AL-11: Railway deployment config — API service
# Deploy via: railway up

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Environment variables are set in the Railway dashboard or via railway vars set
# Required: SUPABASE_URL, SUPABASE_KEY, SUPABASE_JWT_SECRET, REDIS_URL,
#           AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION,
#           S3_BUCKET_SOURCES, S3_BUCKET_ARTIFACTS, KMS_KEY_ARN,
#           ENVIRONMENT=production, ALLOWED_ORIGINS=https://your-app.vercel.app
